<div class="list-container">
  <div class="toolbar">
    <div class="search-box">
      <mat-form-field appearance="outline" class="search-field">
        <mat-icon matPrefix>search</mat-icon>
        <input matInput [formControl]="searchControl" placeholder="搜索课题组编号、名称、负责人">
      </mat-form-field>
    </div>
    <button mat-raised-button color="primary" (click)="openDialog()">
      <mat-icon>add</mat-icon>
      新增课题组
    </button>
  </div>

  <div class="table-wrapper">
    <table mat-table [dataSource]="dataSource" matSort (matSortChange)="onSortChange($event)" [class.loading]="isLoading">
      <ng-container matColumnDef="code">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>编号</th>
        <td mat-cell *matCellDef="let row">{{ row.code }}</td>
      </ng-container>

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>名称</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td>
      </ng-container>

      <ng-container matColumnDef="principalInvestigator">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>负责人</th>
        <td mat-cell *matCellDef="let row">{{ row.principalInvestigator }}</td>
      </ng-container>

      <ng-container matColumnDef="contactPhone">
        <th mat-header-cell *matHeaderCellDef>联系人电话</th>
        <td mat-cell *matCellDef="let row">{{ row.contactPhone || '-' }}</td>
      </ng-container>

      <ng-container matColumnDef="projectCount">
        <th mat-header-cell *matHeaderCellDef>课题数量</th>
        <td mat-cell *matCellDef="let row">{{ getProjectCount(row) }}</td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>创建时间</th>
        <td mat-cell *matCellDef="let row">{{ row.createdAt | date:'yyyy-MM-dd' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>操作</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" matTooltip="编辑" (click)="openDialog(row)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="删除" (click)="onDelete(row)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="no-data-row" *matNoDataRow>
        <td [attr.colspan]="displayedColumns.length" class="no-data">
          @if (isLoading) {
            <div class="loading-tip">加载中...</div>
          } @else {
            <div class="empty-tip">
              <mat-icon>inbox</mat-icon>
              <p>暂无数据</p>
            </div>
          }
        </td>
      </tr>
    </table>

    <mat-paginator
      [length]="totalCount"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      [pageSizeOptions]="[10, 20, 50, 100]"
      showFirstLastButtons
      (page)="onPageChange($event)">
    </mat-paginator>
  </div>
</div>
